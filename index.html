<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>독서기록장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #faf9f7;
  --card: #fff;
  --text: #1a1a1a;
  --muted: #888;
  --light: #bbb;
  --border: #efefef;
  --primary: #2d2d2d;
  --accent: #c8956c;
  --accent-bg: #fdf3ec;
  --blue: #4a90d9;
  --blue-bg: #eef5fd;
  --green: #7cb87c;
  --green-bg: #eef7ee;
  --shadow: 0 1px 8px rgba(0,0,0,0.06);
  --r: 16px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* 헤더 */
.header { padding: 52px 20px 0; }
.header-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
.header-title { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 700; }
.header-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
.add-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none;
  font-size: 24px; line-height: 1; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* 캐릭터 카드 */
.char-card {
  background: var(--card); border-radius: var(--r);
  margin: 0 20px 14px; padding: 18px;
  box-shadow: var(--shadow); cursor: pointer;
}
.char-top { display: flex; gap: 14px; align-items: center; }
.char-canvas-wrap { width: 72px; height: 72px; flex-shrink: 0; }
.char-canvas-wrap canvas { border-radius: 12px; display: block; }
.char-info { flex: 1; }
.char-lv { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .05em; margin-bottom: 2px; }
.char-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.char-title { font-size: 12px; color: var(--muted); margin-bottom: 9px; }
.xp-row { display: flex; align-items: center; gap: 8px; }
.xp-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.xp-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .5s; }
.xp-label { font-size: 11px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.char-stats { display: flex; gap: 0; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.stat { flex: 1; text-align: center; }
.stat-val { font-size: 18px; font-weight: 700; }
.stat-label { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 1px; }

/* 통계 칩 */
.chips { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 14px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: var(--card); border: 1.5px solid var(--border); color: var(--muted); white-space: nowrap; }
.chip b { color: var(--text); }

/* 탭 */
.tabs { display: flex; padding: 0 20px; border-bottom: 1.5px solid var(--border); margin-bottom: 2px; }
.tab { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; }
.tab.on { color: var(--text); border-bottom-color: var(--primary); }

/* 리스트 */
.list { padding: 12px 20px 0; display: flex; flex-direction: column; gap: 10px; }

/* 빈 상태 */
.empty { text-align: center; padding: 48px 20px; color: var(--muted); }
.empty-icon { font-size: 38px; margin-bottom: 10px; }
.empty p { font-size: 14px; line-height: 1.7; }

/* 책 카드 */
.book-card {
  background: var(--card); border-radius: var(--r);
  padding: 14px; box-shadow: var(--shadow);
  display: flex; gap: 12px; align-items: flex-start;
}
.book-thumb {
  width: 52px; height: 72px; border-radius: 8px;
  flex-shrink: 0; object-fit: cover;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.book-thumb.done-bg { background: #f5f5f5; }
.book-thumb.reading-bg { background: var(--blue-bg); }
.book-thumb.want-bg { background: var(--green-bg); }
.book-thumb img { width: 52px; height: 72px; object-fit: cover; border-radius: 8px; }
.book-body { flex: 1; min-width: 0; }
.book-title { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.book-author { font-size: 12px; color: var(--muted); margin-bottom: 7px; }
.book-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.badge-done    { background: #f5f5f5; color: var(--primary); }
.badge-reading { background: var(--blue-bg); color: var(--blue); }
.badge-want    { background: var(--green-bg); color: var(--green); }
.stars { display: flex; gap: 1px; }
.star { font-size: 12px; color: var(--light); }
.star.on { color: #f5a623; }
.book-date { font-size: 11px; color: var(--light); }
.book-memo { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.book-actions { display: flex; flex-direction: column; gap: 4px; }
.act-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }

/* 상세 모달 */
.detail-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.detail-overlay.on { display: flex; }
.detail-sheet {
  background: #fff; border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  padding: 20px 20px calc(28px + env(safe-area-inset-bottom));
  animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
  max-height: 88vh; overflow-y: auto;
}
.detail-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.detail-top { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; }
.detail-cover { width: 72px; height: 100px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 32px; }
.detail-cover img { width: 72px; height: 100px; object-fit: cover; border-radius: 10px; }
.detail-info { flex: 1; }
.detail-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 5px; }
.detail-author { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.detail-publisher { font-size: 12px; color: var(--light); margin-bottom: 10px; }
.detail-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.detail-divider { height: 1px; background: var(--border); margin: 14px 0; }
.detail-section-label { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .05em; margin-bottom: 8px; }
.detail-memo { font-size: 14px; color: var(--text); line-height: 1.75; white-space: pre-wrap; }
.detail-no-memo { font-size: 13px; color: var(--light); font-style: italic; }
.detail-date { font-size: 12px; color: var(--light); margin-top: 14px; }
.detail-actions { display: flex; gap: 10px; margin-top: 18px; }
.detail-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
.detail-btn-edit { background: var(--primary); color: #fff; }
.detail-btn-del  { background: #fff0f0; color: #e24b4a; border: 1.5px solid #fca5a5; }

/* AI 탭 */
.ai-wrap { padding: 14px 20px; }
.ai-card { background: var(--card); border-radius: var(--r); padding: 18px; box-shadow: var(--shadow); }
.ai-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.ai-head-title { font-size: 14px; font-weight: 700; }
.ai-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--accent-bg); color: var(--accent); }
.ai-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; line-height: 1.6; }
.ai-btn {
  width: 100%; padding: 13px; border: none; border-radius: 12px;
  background: var(--primary); color: #fff;
  font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.ai-btn:disabled { background: #ccc; cursor: not-allowed; }
.ai-result { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.ai-result.on { display: block; }
.ai-result-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: .05em; margin-bottom: 8px; }
.loading-dots span { display: inline-block; animation: dot 1.2s infinite; font-size: 16px; color: var(--accent); }
.loading-dots span:nth-child(2) { animation-delay: .2s; }
.loading-dots span:nth-child(3) { animation-delay: .4s; }

/* 바텀 네비 */
.bnav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(255,255,255,.96); backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  display: flex; padding: 6px 0 calc(6px + env(safe-area-inset-bottom));
  z-index: 50;
}
.bnav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 6px 0; }
.bnav-icon { font-size: 22px; }
.bnav-label { font-size: 10px; font-weight: 600; color: var(--muted); }
.bnav-item.on .bnav-label { color: var(--primary); }

/* 레벨업 팝업 */
.levelup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200;
  align-items: center; justify-content: center;
}
.levelup-overlay.on { display: flex; }
.levelup-box {
  background: #fff; border-radius: 24px; padding: 36px 28px;
  text-align: center; max-width: 280px; width: 90%;
  animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
}
.lu-emoji { font-size: 52px; margin-bottom: 12px; }
.lu-tag { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: .08em; margin-bottom: 6px; }
.lu-name { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.lu-desc { font-size: 13px; color: var(--muted); margin-bottom: 22px; line-height: 1.6; }
.lu-btn {
  width: 100%; padding: 13px; border: none; border-radius: 12px;
  background: var(--primary); color: #fff;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer;
}

/* 모달 */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.on { display: flex; }
.modal {
  background: #fff; border-radius: 24px 24px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  width: 100%; max-width: 480px;
  animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
  max-height: 92vh; overflow-y: auto;
}
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
.fgroup { margin-bottom: 14px; }
.flabel { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .04em; margin-bottom: 5px; display: block; }
.finput {
  width: 100%; padding: 11px 13px;
  border: 1.5px solid var(--border); border-radius: 12px;
  font-family: 'Noto Sans KR', sans-serif; font-size: 15px; color: var(--text);
  outline: none; background: var(--bg);
}
.finput:focus { border-color: var(--primary); background: #fff; }
.finput::placeholder { color: var(--light); }
textarea.finput { min-height: 76px; resize: none; }

/* 책 검색 */
.search-wrap { position: relative; }
.search-input-row { display: flex; gap: 8px; }
.search-input-row .finput { flex: 1; padding-right: 12px; }
.search-go {
  padding: 11px 16px; border: none; border-radius: 12px;
  background: var(--primary); color: #fff;
  font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.search-go:disabled { background: #ccc; cursor: not-allowed; }
.search-drop {
  display: none; background: #fff;
  border: 1.5px solid var(--border); border-radius: 12px;
  margin-top: 6px; overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
  max-height: 240px; overflow-y: auto;
}
.search-drop.on { display: block; }
.sitem { display: flex; gap: 10px; padding: 11px 13px; cursor: pointer; border-bottom: 1px solid var(--border); align-items: center; }
.sitem:last-child { border-bottom: none; }
.sitem:active { background: var(--bg); }
.sthumb { width: 34px; height: 48px; object-fit: cover; border-radius: 4px; flex-shrink: 0; background: var(--border); }
.sinfo { flex: 1; min-width: 0; }
.stitle { font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sauthor { font-size: 11px; color: var(--muted); margin-top: 2px; }
.spub { font-size: 11px; color: var(--light); margin-top: 1px; }
.search-msg { padding: 14px; text-align: center; font-size: 13px; color: var(--muted); }

/* 선택된 표지 */
.cover-preview { display: none; }
.cover-preview.on { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
.cover-img { width: 44px; height: 62px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.cover-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

/* 상태 버튼 */
.status-row { display: flex; gap: 8px; }
.sbtn {
  flex: 1; padding: 10px 6px; border: 1.5px solid var(--border);
  border-radius: 10px; background: #fff; color: var(--muted);
  font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; text-align: center;
}
.sbtn.on-done    { background: #f5f5f5; border-color: var(--primary); color: var(--primary); }
.sbtn.on-reading { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.sbtn.on-want    { background: var(--green-bg); border-color: var(--green); color: var(--green); }

/* 별점 */
.star-row { display: flex; gap: 4px; }
.star-btn {
  font-size: 26px; cursor: pointer; background: none; border: none; padding: 0;
  position: relative; width: 28px; height: 28px; display: flex; align-items: center;
}
.star-btn::before { content: '★'; color: var(--light); position: absolute; left: 0; }
.star-btn.half::before { 
  background: linear-gradient(90deg, #f5a623 50%, var(--light) 50%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.star-btn.full::before { color: #f5a623; }

/* 모달 하단 버튼 */
.modal-footer { display: flex; gap: 10px; margin-top: 18px; }
.mbtn { flex: 1; padding: 13px; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.mbtn-cancel { background: var(--border); color: var(--muted); }
.mbtn-save { background: var(--primary); color: #fff; }

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes popIn   { from { opacity:0; transform:scale(.85); } to { opacity:1; transform:scale(1); } }
@keyframes dot     { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-row">
    <div>
      <div class="header-title">내 독서기록</div>
      <div class="header-sub" id="header-sub">오늘도 한 페이지</div>
    </div>
    <button class="add-btn" id="add-btn">+</button>
  </div>
</div>

<!-- 캐릭터 카드 -->
<div class="char-card" id="char-card">
  <div class="char-top">
    <div class="char-canvas-wrap"><canvas id="char-canvas" width="72" height="72"></canvas></div>
    <div class="char-info">
      <div class="char-lv" id="char-lv">LV.1 · 새싹 독서가</div>
      <div class="char-name" id="char-name">새싹 독서가</div>
      <div class="char-title" id="char-title-txt">첫 책을 기다리는 중...</div>
      <div class="xp-row">
        <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
        <div class="xp-label" id="xp-label">0/3 XP</div>
      </div>
    </div>
  </div>
  <div class="char-stats">
    <div class="stat"><div class="stat-val" id="s-done">0</div><div class="stat-label">완독</div></div>
    <div class="stat"><div class="stat-val" id="s-reading">0</div><div class="stat-label">읽는 중</div></div>
    <div class="stat"><div class="stat-val" id="s-avg">-</div><div class="stat-label">평균 별점</div></div>
    <div class="stat"><div class="stat-val" id="s-month">0</div><div class="stat-label">이달 완독</div></div>
  </div>
</div>

<!-- 통계 칩 -->
<div class="chips" id="chips"></div>

<!-- 탭 -->
<div class="tabs">
  <div class="tab on" data-tab="all">전체</div>
  <div class="tab" data-tab="done">읽었어요</div>
  <div class="tab" data-tab="reading">읽는 중</div>
  <div class="tab" data-tab="want">위시리스트</div>
  <div class="tab" data-tab="ai">AI 추천</div>
</div>

<!-- 책 목록 -->
<div id="page-books">
  <div class="list" id="book-list"></div>
</div>

<!-- AI 추천 -->
<div id="page-ai" style="display:none;">
  <div class="ai-wrap">
    <div class="ai-card">
      <div class="ai-head">
        <div class="ai-head-title">다음에 읽을 책 추천</div>
        <div class="ai-tag">AI</div>
      </div>
      <div class="ai-desc">읽은 책 목록을 분석해서 취향에 맞는 책 3권을 추천해드려요.</div>
      <button class="ai-btn" id="ai-btn">✨ 추천받기</button>
      <div class="ai-result" id="ai-result">
        <div class="ai-result-label">CLAUDE 추천</div>
        <div id="ai-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- 바텀 네비 -->
<nav class="bnav">
  <div class="bnav-item on" data-tab="all"><div class="bnav-icon">📚</div><div class="bnav-label">전체</div></div>
  <div class="bnav-item" data-tab="reading"><div class="bnav-icon">📖</div><div class="bnav-label">읽는 중</div></div>
  <div class="bnav-item" data-tab="want"><div class="bnav-icon">🔖</div><div class="bnav-label">위시리스트</div></div>
  <div class="bnav-item" data-tab="ai"><div class="bnav-icon">✨</div><div class="bnav-label">AI 추천</div></div>
</nav>

<!-- 상세 보기 시트 -->
<div class="detail-overlay" id="detail-overlay">
  <div class="detail-sheet">
    <div class="detail-handle"></div>
    <div class="detail-top">
      <div class="detail-cover" id="detail-cover"></div>
      <div class="detail-info">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-author" id="detail-author"></div>
        <div class="detail-publisher" id="detail-publisher"></div>
        <div class="detail-badges" id="detail-badges"></div>
      </div>
    </div>
    <div class="detail-divider"></div>
    <div class="detail-section-label">메모 / 감상</div>
    <div id="detail-memo"></div>
    <div class="detail-date" id="detail-date"></div>
    <div class="detail-actions">
      <button class="detail-btn detail-btn-edit" id="detail-edit">✏️ 수정하기</button>
      <button class="detail-btn detail-btn-del"  id="detail-del">🗑 삭제</button>
    </div>
  </div>
</div>

<!-- 레벨업 팝업 -->
<div class="levelup-overlay" id="lu-overlay">
  <div class="levelup-box">
    <div class="lu-emoji" id="lu-emoji">🎉</div>
    <div class="lu-tag">LEVEL UP!</div>
    <div class="lu-name" id="lu-name">LV.2</div>
    <div class="lu-desc" id="lu-desc">새로운 칭호를 얻었어요!</div>
    <button class="lu-btn" id="lu-close">확인</button>
  </div>
</div>

<!-- 책 추가/수정 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">책 추가</div>

    <div class="fgroup">
      <label class="flabel">책 검색</label>
      <div class="search-wrap">
        <div class="search-input-row">
          <input class="finput" id="f-search" type="text" placeholder="제목으로 검색">
          <button class="search-go" id="search-go-btn">검색</button>
        </div>
        <div class="search-drop" id="search-drop"></div>
      </div>
      <div class="cover-preview" id="cover-preview">
        <img class="cover-img" id="cover-img" src="">
        <div class="cover-desc" id="cover-desc"></div>
      </div>
    </div>

    <div class="fgroup">
      <label class="flabel">책 제목</label>
      <input class="finput" id="f-title" type="text" placeholder="직접 입력도 가능해요">
    </div>
    <div class="fgroup">
      <label class="flabel">저자</label>
      <input class="finput" id="f-author" type="text" placeholder="저자명">
    </div>
    <div class="fgroup">
      <label class="flabel">상태</label>
      <div class="status-row">
        <button class="sbtn" id="sbtn-done">✅ 읽었어요</button>
        <button class="sbtn" id="sbtn-reading">📖 읽는 중</button>
        <button class="sbtn" id="sbtn-want">🔖 읽고 싶어</button>
      </div>
    </div>
    <div class="fgroup" id="rating-group">
      <label class="flabel">별점</label>
      <div class="star-row" id="star-row">
        <button class="star-btn" data-star="1"></button>
        <button class="star-btn" data-star="2"></button>
        <button class="star-btn" data-star="3"></button>
        <button class="star-btn" data-star="4"></button>
        <button class="star-btn" data-star="5"></button>
      </div>
      <div id="star-label" style="font-size:12px;color:var(--muted);margin-top:4px;height:16px;"></div>
    </div>
    <div class="fgroup">
      <label class="flabel">메모 / 감상</label>
      <textarea class="finput" id="f-memo" placeholder="인상 깊은 구절이나 감상을 적어보세요"></textarea>
    </div>

    <div class="modal-footer">
      <button class="mbtn mbtn-cancel" id="modal-cancel">취소</button>
      <button class="mbtn mbtn-save" id="modal-save">저장</button>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══ 레벨 시스템 ═══ */
const LEVELS = [
  { lv:1,  need:0,   name:'새싹 독서가',   title:'첫 책을 기다리는 중...', emoji:'🌱', color:'#7cb87c' },
  { lv:2,  need:3,   name:'호기심 독서가',  title:'책의 재미를 알아가는 중', emoji:'📗', color:'#4a90d9' },
  { lv:3,  need:7,   name:'꾸준한 독서가',  title:'습관이 되기 시작했어요',  emoji:'📘', color:'#7c5cbf' },
  { lv:4,  need:15,  name:'열정 독서가',    title:'책이 없으면 허전해요',    emoji:'📙', color:'#e8a000' },
  { lv:5,  need:25,  name:'독서 마니아',    title:'장르를 가리지 않아요',    emoji:'📕', color:'#e24b4a' },
  { lv:6,  need:40,  name:'독서 고수',      title:'책 추천은 나한테 맡겨요', emoji:'🏆', color:'#3b6d11' },
  { lv:7,  need:60,  name:'독서 현인',      title:'독서로 마법을 부려요',    emoji:'🧙', color:'#6a1b9a' },
  { lv:8,  need:100, name:'전설의 독서왕',  title:'독서로 세상을 바꿔요',    emoji:'👑', color:'#c8956c' },
];

function getLv(done) {
  let cur = LEVELS[0];
  for (const l of LEVELS) { if (done >= l.need) cur = l; }
  const idx = LEVELS.indexOf(cur);
  const next = LEVELS[idx+1] || null;
  const xpCur = done - cur.need;
  const xpNext = next ? next.need - cur.need : 1;
  const pct = next ? Math.min(100, Math.round(xpCur/xpNext*100)) : 100;
  return { cur, next, xpCur, xpNext, pct };
}

function drawChar(canvas, done) {
  const ctx = canvas.getContext('2d');
  const W=72, H=72;
  ctx.clearRect(0,0,W,H);
  const { cur } = getLv(done);
  ctx.fillStyle = cur.color+'22';
  ctx.beginPath(); ctx.roundRect(0,0,W,H,12); ctx.fill();
  ctx.font='38px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(cur.emoji, W/2, H/2+2);
  ctx.fillStyle = cur.color;
  ctx.beginPath(); ctx.roundRect(4,4,28,17,8); ctx.fill();
  ctx.fillStyle='white'; ctx.font='bold 9px sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('LV.'+cur.lv, 18, 13);
}

/* ═══ 데이터 ═══ */
const KEY = 'booklog_final';
let books = [];
try { books = JSON.parse(localStorage.getItem(KEY)) || []; } catch{}
function saveData() { localStorage.setItem(KEY, JSON.stringify(books)); }

/* ═══ 상세 보기 ═══ */
function openDetail(id) {
  const b = books.find(x => x.id === id);
  if (!b) return;

  // 표지
  const coverEl = document.getElementById('detail-cover');
  if (b.cover) {
    coverEl.innerHTML = '<img src="'+esc(b.cover)+'" onerror="this.parentNode.innerHTML='📗'">';
  } else {
    coverEl.innerHTML = b.status==='done'?'📗':b.status==='reading'?'📖':'🔖';
    coverEl.style.background = b.status==='done'?'#f5f5f5':b.status==='reading'?'var(--blue-bg)':'var(--green-bg)';
  }

  document.getElementById('detail-title').textContent = b.title;
  document.getElementById('detail-author').textContent = b.author || '';
  document.getElementById('detail-publisher').textContent = b.publisher || '';

  // 뱃지 + 별점
  const badgeText = b.status==='done'?'읽었어요':b.status==='reading'?'읽는 중':'읽고 싶어';
  const badgeClass = 'badge-'+b.status;
  let starsHTML = '';
  if (b.status==='done' && b.rating) {
    starsHTML = '<div class="stars">' + [1,2,3,4,5].map(i => {
      if (b.rating >= i) return '<span class="star on">★</span>';
      if (b.rating >= i-0.5) return '<span class="star" style="background:linear-gradient(90deg,#f5a623 50%,var(--light) 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">★</span>';
      return '<span class="star">★</span>';
    }).join('') + '<span style="font-size:12px;color:var(--muted);margin-left:4px;">'+b.rating+'점</span></div>';
  }
  document.getElementById('detail-badges').innerHTML =
    '<span class="badge '+badgeClass+'">'+badgeText+'</span>' + starsHTML;

  // 메모
  const memoEl = document.getElementById('detail-memo');
  if (b.memo) {
    memoEl.className = 'detail-memo';
    memoEl.textContent = b.memo;
  } else {
    memoEl.className = 'detail-no-memo';
    memoEl.textContent = '아직 메모가 없어요.';
  }

  document.getElementById('detail-date').textContent = b.date ? '기록일 ' + b.date : '';

  // 버튼 이벤트
  document.getElementById('detail-edit').onclick = () => { closeDetail(); openModal(id); };
  document.getElementById('detail-del').onclick = () => {
    if (!confirm('이 책을 삭제할까요?')) return;
    closeDetail();
    deleteBook(id);
  };

  document.getElementById('detail-overlay').classList.add('on');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('on');
}

/* ═══ 상태 ═══ */
let curTab = 'all';
let editId = null;
let selStatus = 'done';
let selStar = 0;
let selCover = '';
let selPublisher = '';
let prevDone = books.filter(b=>b.status==='done').length;

/* ═══ 유틸 ═══ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══ 캐릭터 업데이트 ═══ */
function updateChar(animate) {
  const done = books.filter(b=>b.status==='done').length;
  const reading = books.filter(b=>b.status==='reading').length;
  const { cur, next, xpCur, xpNext, pct } = getLv(done);
  drawChar(document.getElementById('char-canvas'), done);
  document.getElementById('char-lv').textContent = 'LV.'+cur.lv+' · '+cur.name;
  document.getElementById('char-name').textContent = cur.name;
  document.getElementById('char-title-txt').textContent = cur.title;
  document.getElementById('xp-fill').style.width = pct+'%';
  document.getElementById('xp-label').textContent = next ? xpCur+'/'+xpNext+' XP' : 'MAX';
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-reading').textContent = reading;
  const rated = books.filter(b=>b.status==='done'&&b.rating);
  document.getElementById('s-avg').textContent = rated.length ? (rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1) : '-';
  const now = new Date();
  document.getElementById('s-month').textContent = books.filter(b=>{
    if(b.status!=='done'||!b.dateISO) return false;
    const d = new Date(b.dateISO);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;
  document.getElementById('header-sub').textContent = done ? '총 '+done+'권 완독 · 오늘도 한 페이지' : '오늘도 한 페이지';
  document.getElementById('chips').innerHTML =
    '<div class="chip"><b>'+done+'</b>권 완독</div>'+
    '<div class="chip"><b>'+reading+'</b>권 읽는 중</div>'+
    '<div class="chip"><b>'+books.filter(b=>b.status==='want').length+'</b>권 위시리스트</div>'+
    '<div class="chip">평균 <b>'+(rated.length?(rated.reduce((s,b)=>s+b.rating,0)/rated.length).toFixed(1):'-')+'</b>점</div>';
  if (animate && done > prevDone) {
    const prevLv = getLv(prevDone).cur.lv;
    if (cur.lv > prevLv) showLevelup(cur);
  }
  prevDone = done;
}

function showLevelup(lvInfo) {
  document.getElementById('lu-emoji').textContent = lvInfo.emoji;
  document.getElementById('lu-name').textContent = 'LV.'+lvInfo.lv+' '+lvInfo.name;
  document.getElementById('lu-desc').textContent = lvInfo.title;
  document.getElementById('lu-overlay').classList.add('on');
}

/* ═══ 탭 전환 ═══ */
function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab===tab));
  document.querySelectorAll('.bnav-item').forEach(t => t.classList.toggle('on', t.dataset.tab===tab));
  document.getElementById('page-books').style.display = tab==='ai' ? 'none' : 'block';
  document.getElementById('page-ai').style.display = tab==='ai' ? 'block' : 'none';
  if (tab!=='ai') renderBooks();
}

/* ═══ 책 렌더링 ═══ */
function renderBooks() {
  const filter = curTab==='all' ? null : curTab;
  const list = filter ? books.filter(b=>b.status===filter) : [...books];
  list.sort((a,b)=>b.id-a.id);
  const el = document.getElementById('book-list');
  if (!list.length) {
    const icons = {all:'📚',done:'📗',reading:'📖',want:'🔖'};
    const msgs = {all:'아직 기록된 책이 없어요.\n+ 버튼을 눌러 첫 책을 추가해보세요!', done:'아직 완독한 책이 없어요.', reading:'읽고 있는 책을 추가해보세요.', want:'읽고 싶은 책을 추가해보세요.'};
    el.innerHTML = '<div class="empty"><div class="empty-icon">'+icons[curTab]+'</div><p>'+(msgs[curTab]||'').replace('\n','<br>')+'</p></div>';
    return;
  }
  el.innerHTML = list.map(b => {
    const badgeClass = 'badge-'+b.status;
    const badgeText = b.status==='done'?'읽었어요':b.status==='reading'?'읽는 중':'읽고 싶어';
    const thumbHTML = b.cover
      ? '<div class="book-thumb"><img src="'+esc(b.cover)+'" onerror="this.parentNode.innerHTML=\'📗\'"></div>'
      : '<div class="book-thumb '+(b.status==='done'?'done-bg':b.status==='reading'?'reading-bg':'want-bg')+'">'+(b.status==='done'?'📗':b.status==='reading'?'📖':'🔖')+'</div>';
    const starsHTML = b.status==='done' && b.rating ? '<div class="stars">'+[1,2,3,4,5].map(i => {
      if (b.rating >= i) return '<span class="star on">★</span>';
      if (b.rating >= i - 0.5) return '<span class="star" style="background:linear-gradient(90deg,#f5a623 50%,var(--light) 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">★</span>';
      return '<span class="star">★</span>';
    }).join('')+'<span style="font-size:11px;color:var(--muted);margin-left:3px;">'+b.rating+'</span></div>' : '';
    const memoHTML = b.memo ? '<div class="book-memo">'+esc(b.memo)+'</div>' : '';
    return '<div class="book-card" data-id="'+b.id+'">'+
      thumbHTML+
      '<div class="book-body">'+
        '<div class="book-title">'+esc(b.title)+'</div>'+
        '<div class="book-author">'+esc(b.author||'')+'</div>'+
        '<div class="book-meta"><span class="badge '+badgeClass+'">'+badgeText+'</span>'+starsHTML+'<span class="book-date">'+esc(b.date||'')+'</span></div>'+
        memoHTML+
      '</div>'+
      '<div class="book-actions">'+
        '<button class="act-btn" data-edit="'+b.id+'">✏️</button>'+
        '<button class="act-btn" data-del="'+b.id+'">🗑</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

/* ═══ 모달 ═══ */
function openModal(id=null) {
  editId = id;
  const b = id ? books.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = id ? '책 수정' : '책 추가';
  document.getElementById('f-search').value = '';
  document.getElementById('f-title').value = b ? b.title : '';
  document.getElementById('f-author').value = b ? (b.author||'') : '';
  document.getElementById('f-memo').value = b ? (b.memo||'') : '';
  document.getElementById('search-drop').classList.remove('on');
  selCover = b ? (b.cover||'') : '';
  selPublisher = b ? (b.publisher||'') : '';
  if (b && b.cover) {
    document.getElementById('cover-img').src = b.cover;
    document.getElementById('cover-desc').textContent = b.publisher||'';
    document.getElementById('cover-preview').classList.add('on');
  } else {
    document.getElementById('cover-preview').classList.remove('on');
  }
  setStatus(b ? b.status : 'done');
  setStar(b ? (b.rating||0) : 0);
  document.getElementById('modal-overlay').classList.add('on');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('on');
  document.getElementById('search-drop').classList.remove('on');
}

function setStatus(s) {
  selStatus = s;
  document.getElementById('sbtn-done').className = 'sbtn'+(s==='done'?' on-done':'');
  document.getElementById('sbtn-reading').className = 'sbtn'+(s==='reading'?' on-reading':'');
  document.getElementById('sbtn-want').className = 'sbtn'+(s==='want'?' on-want':'');
  document.getElementById('rating-group').style.display = s==='done' ? 'block' : 'none';
}

function setStar(n) {
  selStar = n;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    const starNum = i + 1;
    btn.classList.remove('full', 'half');
    if (n >= starNum) btn.classList.add('full');
    else if (n >= starNum - 0.5) btn.classList.add('half');
  });
  const label = document.getElementById('star-label');
  if (label) label.textContent = n ? n + '점' : '';
}

function saveBook() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('책 제목을 입력해주세요.'); return; }
  const now = new Date();
  const dateStr = (now.getMonth()+1)+'/'+now.getDate();
  prevDone = books.filter(b=>b.status==='done').length;
  const bookData = {
    title,
    author: document.getElementById('f-author').value.trim(),
    status: selStatus,
    rating: selStar,
    memo: document.getElementById('f-memo').value.trim(),
    cover: selCover,
    publisher: selPublisher,
  };
  if (editId) {
    const idx = books.findIndex(b=>b.id===editId);
    if (idx>=0) books[idx] = { ...books[idx], ...bookData };
  } else {
    books.push({ id: Date.now(), ...bookData, date: dateStr, dateISO: now.toISOString() });
  }
  saveData();
  closeModal();
  renderBooks();
  updateChar(true);
}

function deleteBook(id) {
  if (!confirm('이 책을 삭제할까요?')) return;
  books = books.filter(b=>b.id!==id);
  saveData(); renderBooks(); updateChar(false);
}

/* ═══ 책 검색 (네이버 API) ═══ */
async function searchBooks() {
  const query = document.getElementById('f-search').value.trim();
  if (!query) { alert('검색어를 입력해주세요.'); return; }
  const btn = document.getElementById('search-go-btn');
  const drop = document.getElementById('search-drop');
  btn.textContent = '검색 중...'; btn.disabled = true;
  drop.classList.add('on');
  drop.innerHTML = '<div class="search-msg">검색 중...</div>';
  try {
    const res = await fetch('/api/search?q='+encodeURIComponent(query));
    if (!res.ok) throw new Error('API 오류: '+res.status);
    const data = await res.json();
    if (!data.items || !data.items.length) {
      drop.innerHTML = '<div class="search-msg">검색 결과가 없어요.</div>';
      return;
    }
    drop.innerHTML = data.items.map((item, idx) =>
      '<div class="sitem" data-idx="'+idx+'">'+
        (item.image ? '<img class="sthumb" src="'+esc(item.image)+'" onerror="this.style.display=\'none\'">' : '<div class="sthumb"></div>')+
        '<div class="sinfo">'+
          '<div class="stitle">'+esc((item.title||'').replace(/<[^>]+>/g,''))+'</div>'+
          '<div class="sauthor">'+esc((item.author||'').replace(/<[^>]+>/g,''))+'</div>'+
          '<div class="spub">'+esc((item.publisher||'').replace(/<[^>]+>/g,''))+'</div>'+
        '</div>'+
      '</div>'
    ).join('');
    // 클릭 이벤트를 각 아이템에 직접 등록
    drop.querySelectorAll('.sitem').forEach((el, idx) => {
      const item = data.items[idx];
      el.addEventListener('click', () => {
        const title = (item.title||'').replace(/<[^>]+>/g,'');
        const author = (item.author||'').replace(/<[^>]+>/g,'');
        const publisher = (item.publisher||'').replace(/<[^>]+>/g,'');
        const cover = item.image||'';
        document.getElementById('f-title').value = title;
        document.getElementById('f-author').value = author;
        selCover = cover;
        selPublisher = publisher;
        drop.classList.remove('on');
        document.getElementById('f-search').value = title;
        if (cover) {
          document.getElementById('cover-img').src = cover;
          document.getElementById('cover-desc').textContent = publisher;
          document.getElementById('cover-preview').classList.add('on');
        } else {
          document.getElementById('cover-preview').classList.remove('on');
        }
      });
    });
  } catch(e) {
    drop.innerHTML = '<div class="search-msg">검색에 실패했어요.<br>제목을 직접 입력해주세요.</div>';
    console.error(e);
  }
  btn.textContent = '검색'; btn.disabled = false;
}

/* ═══ AI 추천 ═══ */
async function requestAI() {
  const done = books.filter(b=>b.status==='done');
  if (!done.length) { alert('읽은 책이 없으면 취향을 파악하기 어려워요!\n먼저 읽은 책을 한 권 이상 추가해주세요.'); return; }
  const btn = document.getElementById('ai-btn');
  const result = document.getElementById('ai-result');
  const body = document.getElementById('ai-body');
  btn.textContent = '분석 중...'; btn.disabled = true;
  result.classList.add('on');
  body.innerHTML = '<div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>';
  const bookList = done.map(b=>'- "'+b.title+'"'+(b.author?' ('+b.author+')':'')+(b.rating?' 별점'+b.rating:'')+(b.memo?' — '+b.memo.slice(0,40):'')).join('\n');
  try {
    const res = await fetch('/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ books: done })
    });
    const data = await res.json();
    const text = data.text || data.error || '추천을 가져오지 못했습니다.';
    body.innerHTML = '<div style="white-space:pre-wrap;font-size:13px;line-height:1.85;">'+esc(text)+'</div>';
  } catch {
    body.innerHTML = '<div style="color:#b91c1c;font-size:13px;">오류가 발생했어요. 잠시 후 다시 시도해주세요.</div>';
  }
  btn.textContent = '✨ 다시 추천받기'; btn.disabled = false;
}

/* ═══ 이벤트 등록 ═══ */
document.addEventListener('DOMContentLoaded', () => {

  // + 버튼
  document.getElementById('add-btn').addEventListener('click', () => openModal());

  // 캐릭터 카드 탭
  document.getElementById('char-card').addEventListener('click', () => {
    const done = books.filter(b=>b.status==='done').length;
    const info = getLv(done);
    const next = info.next;
    alert(next
      ? '현재 LV.'+info.cur.lv+' '+info.cur.name+'\n앞으로 '+(next.need-done)+'권 더 읽으면 "'+next.name+'"으로 레벨업!'
      : 'LV.'+info.cur.lv+' 최고 레벨 달성! 전설의 독서왕입니다 👑');
  });

  // 탭 클릭
  document.querySelectorAll('.tab, .bnav-item').forEach(el => {
    el.addEventListener('click', () => switchTab(el.dataset.tab));
  });

  // 상태 버튼
  document.getElementById('sbtn-done').addEventListener('click', () => setStatus('done'));
  document.getElementById('sbtn-reading').addEventListener('click', () => setStatus('reading'));
  document.getElementById('sbtn-want').addEventListener('click', () => setStatus('want'));

  // 별점 — 버튼 왼쪽 절반 클릭 = 0.5, 오른쪽 = 1.0
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const isHalf = x < rect.width / 2;
      const starNum = parseFloat(btn.dataset.star);
      const newVal = isHalf ? starNum - 0.5 : starNum;
      // 같은 값 클릭하면 초기화
      setStar(selStar === newVal ? 0 : newVal);
    });
    // 마우스 올릴 때 미리보기
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const isHalf = x < rect.width / 2;
      const starNum = parseFloat(btn.dataset.star);
      const previewVal = isHalf ? starNum - 0.5 : starNum;
      document.querySelectorAll('.star-btn').forEach((b, i) => {
        const sn = i + 1;
        b.classList.remove('full', 'half');
        if (previewVal >= sn) b.classList.add('full');
        else if (previewVal >= sn - 0.5) b.classList.add('half');
      });
    });
    btn.addEventListener('mouseleave', () => setStar(selStar));
  });

  // 검색
  document.getElementById('search-go-btn').addEventListener('click', searchBooks);
  document.getElementById('f-search').addEventListener('keydown', e => { if(e.key==='Enter'){e.preventDefault();searchBooks();} });

  // 모달 버튼
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', saveBook);

  // 모달 외부 클릭
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if(e.target===document.getElementById('modal-overlay')) closeModal();
  });

  // 레벨업 닫기
  document.getElementById('lu-close').addEventListener('click', () => {
    document.getElementById('lu-overlay').classList.remove('on');
  });

  // AI 추천
  document.getElementById('ai-btn').addEventListener('click', requestAI);

  // 책 카드 버튼 (이벤트 위임)
  document.getElementById('book-list').addEventListener('click', e => {
    const editBtn = e.target.closest('[data-edit]');
    const delBtn  = e.target.closest('[data-del]');
    const card    = e.target.closest('[data-id]');
    if (editBtn) { openModal(parseInt(editBtn.dataset.edit)); return; }
    if (delBtn)  { deleteBook(parseInt(delBtn.dataset.del)); return; }
    if (card)    { openDetail(parseInt(card.dataset.id)); }
  });

  // 상세 모달 외부 클릭 닫기
  document.getElementById('detail-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  });

  // 검색 드롭다운 외부 클릭 닫기
  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) {
      document.getElementById('search-drop').classList.remove('on');
    }
  });

  // 초기 렌더
  updateChar(false);
  renderBooks();
});
</script>
</body>
</html>
