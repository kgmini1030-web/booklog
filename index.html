<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>독서기록장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #faf9f7;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-muted: #888;
  --text-light: #bbb;
  --border: #efefef;
  --primary: #2d2d2d;
  --accent: #c8956c;
  --accent-light: #fdf3ec;
  --reading: #4a90d9;
  --reading-light: #eef5fd;
  --want: #7cb87c;
  --want-light: #eef7ee;
  --done: #2d2d2d;
  --done-light: #f5f5f5;
  --shadow: 0 1px 8px rgba(0,0,0,0.06);
  --radius: 16px;
}
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); max-width: 480px; margin: 0 auto; padding-bottom: 90px; }

/* ── 헤더 ── */
.header { padding: 52px 24px 0; }
.header-top { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
.header-title { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 700; }
.header-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
.add-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.15s; }
.add-btn:active { transform: scale(0.92); }

/* ── 캐릭터 카드 ── */
.char-card { background: var(--card); border-radius: var(--radius); margin: 0 24px 16px; padding: 20px; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.15s; }
.char-card:active { transform: scale(0.98); }
.char-top { display: flex; align-items: center; gap: 16px; }
.char-avatar { width: 72px; height: 72px; flex-shrink: 0; position: relative; }
.char-avatar canvas { border-radius: 12px; }
.char-info { flex: 1; }
.char-level { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; margin-bottom: 2px; }
.char-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.char-title { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
.xp-bar-wrap { display: flex; align-items: center; gap: 8px; }
.xp-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e8b98a); border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.xp-label { font-size: 11px; font-weight: 700; color: var(--text-muted); white-space: nowrap; }
.char-stats { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.char-stat { flex: 1; text-align: center; }
.char-stat-val { font-size: 17px; font-weight: 700; }
.char-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
.char-hint { text-align: center; font-size: 11px; color: var(--text-light); margin-top: 10px; }

/* ── 레벨업 뱃지 ── */
.level-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-light); border: 1.5px solid var(--accent); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: var(--accent); margin: 0 24px 14px; }

/* ── 통계 칩 ── */
.stats-row { display: flex; gap: 8px; overflow-x: auto; padding: 0 24px 16px; scrollbar-width: none; }
.stats-row::-webkit-scrollbar { display: none; }
.stat-chip { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; background: var(--card); border: 1.5px solid var(--border); color: var(--text-muted); }
.stat-chip span { color: var(--text); font-weight: 700; margin-right: 3px; }

/* ── 탭 ── */
.tab-bar { display: flex; padding: 0 24px; border-bottom: 1.5px solid var(--border); }
.tab { flex: 1; padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: all 0.2s; }
.tab.active { color: var(--text); border-bottom-color: var(--primary); }

/* ── 리스트 ── */
.list-wrap { padding: 16px 24px 0; }
.empty { text-align: center; padding: 48px 0; }
.empty-icon { font-size: 38px; margin-bottom: 12px; }
.empty p { font-size: 14px; color: var(--text-muted); }

/* ── 책 카드 ── */
.book-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; gap: 14px; align-items: flex-start; transition: transform 0.15s; }
.book-card:active { transform: scale(0.98); }
.book-cover { width: 52px; height: 72px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.cover-done    { background: var(--done-light); }
.cover-reading { background: var(--reading-light); }
.cover-want    { background: var(--want-light); }
.book-info { flex: 1; min-width: 0; }
.book-title  { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.book-author { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.book-meta   { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.status-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
.badge-done    { background: var(--done-light); color: var(--done); }
.badge-reading { background: var(--reading-light); color: var(--reading); }
.badge-want    { background: var(--want-light); color: var(--want); }
.star-row { display: flex; gap: 1px; }
.star { font-size: 13px; color: var(--text-light); }
.star.on { color: #f5a623; }
.book-date { font-size: 11px; color: var(--text-light); }
.book-memo { font-size: 12px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-actions { display: flex; flex-direction: column; gap: 6px; }
.icon-btn { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
.icon-btn:active { background: var(--border); }

/* ── AI 추천 ── */
.ai-section { padding: 16px 24px; }
.ai-card { background: var(--card); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
.ai-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.ai-card-title { font-size: 14px; font-weight: 700; }
.ai-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: var(--accent-light); color: var(--accent); }
.ai-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6; }
.ai-req-btn { width: 100%; padding: 13px; border: none; border-radius: 12px; background: var(--primary); color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.ai-req-btn:active { opacity: 0.8; }
.ai-req-btn:disabled { background: #ccc; cursor: not-allowed; }
.ai-result { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.ai-result.show { display: block; }
.ai-result-header { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; margin-bottom: 8px; }
.dots span { display: inline-block; animation: bounce 1.2s infinite; font-size: 16px; color: var(--accent); }
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

/* ── 바텀 네비 ── */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 0; }
.nav-icon { font-size: 22px; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text-muted); }
.nav-item.active .nav-label { color: var(--primary); }

/* ── 레벨업 팝업 ── */
.levelup-popup { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
.levelup-popup.show { display: flex; animation: fadeIn 0.3s; }
.levelup-box { background: white; border-radius: 24px; padding: 36px 32px; text-align: center; max-width: 300px; width: 90%; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
.levelup-emoji { font-size: 52px; margin-bottom: 12px; }
.levelup-title { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 6px; }
.levelup-level { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.levelup-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }
.levelup-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }

/* ── 모달 ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 24px 24px 0 0; padding: 24px 24px calc(24px + env(safe-area-inset-bottom)); width: 100%; max-width: 480px; animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1); max-height: 90vh; overflow-y: auto; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s; background: var(--bg); }
.form-input:focus { border-color: var(--primary); background: white; }
.form-input::placeholder { color: var(--text-light); }
textarea.form-input { min-height: 80px; resize: none; }
.status-btns { display: flex; gap: 8px; }
.status-btn { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; background: white; color: var(--text-muted); text-align: center; }
.status-btn.sel-done    { background: var(--done-light);    border-color: var(--done);    color: var(--done); }
.status-btn.sel-reading { background: var(--reading-light); border-color: var(--reading); color: var(--reading); }
.status-btn.sel-want    { background: var(--want-light);    border-color: var(--want);    color: var(--want); }
.star-picker { display: flex; gap: 6px; }
.star-pick { font-size: 26px; cursor: pointer; color: var(--text-light); transition: color 0.15s; }
.star-pick.on { color: #f5a623; }
.modal-footer { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-cancel { background: var(--border); color: var(--text-muted); }
.btn-save   { background: var(--primary); color: white; }

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes bounce  { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-4px)} }
@keyframes popIn   { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">내 독서기록</div>
      <div class="header-subtitle" id="header-sub">오늘도 한 페이지</div>
    </div>
    <button class="add-btn" onclick="openModal()">+</button>
  </div>
</div>

<!-- 캐릭터 카드 -->
<div class="char-card" id="char-card" onclick="showCharDetail()">
  <div class="char-top">
    <div class="char-avatar"><canvas id="char-canvas" width="72" height="72"></canvas></div>
    <div class="char-info">
      <div class="char-level" id="char-level-label">LV.1 · 독서 입문자</div>
      <div class="char-name" id="char-name">새싹 독서가</div>
      <div class="char-title" id="char-title">첫 책을 기다리는 중...</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
        <div class="xp-label" id="xp-label">0 / 3 XP</div>
      </div>
    </div>
  </div>
  <div class="char-stats">
    <div class="char-stat"><div class="char-stat-val" id="stat-done">0</div><div class="char-stat-label">완독</div></div>
    <div class="char-stat"><div class="char-stat-val" id="stat-reading">0</div><div class="char-stat-label">읽는 중</div></div>
    <div class="char-stat"><div class="char-stat-val" id="stat-avg">-</div><div class="char-stat-label">평균 별점</div></div>
    <div class="char-stat"><div class="char-stat-val" id="stat-streak">0</div><div class="char-stat-label">이달 완독</div></div>
  </div>
  <div class="char-hint">탭해서 성장 기록 보기</div>
</div>

<!-- 통계 칩 -->
<div class="stats-row" id="stats-row"></div>

<!-- 탭 -->
<div class="tab-bar">
  <div class="tab active" onclick="switchTab('all')">전체</div>
  <div class="tab" onclick="switchTab('done')">읽었어요</div>
  <div class="tab" onclick="switchTab('reading')">읽는 중</div>
  <div class="tab" onclick="switchTab('want')">위시리스트</div>
  <div class="tab" onclick="switchTab('ai')">AI 추천</div>
</div>

<!-- 책 목록 -->
<div id="page-books">
  <div class="list-wrap" id="book-list"></div>
</div>

<!-- AI 추천 -->
<div id="page-ai" style="display:none;">
  <div class="ai-section">
    <div class="ai-card">
      <div class="ai-card-header">
        <div class="ai-card-title">다음에 읽을 책 추천</div>
        <div class="ai-badge">AI</div>
      </div>
      <div class="ai-desc">읽은 책 목록을 분석해서 취향에 맞는 책 3권을 추천해드려요.</div>
      <button class="ai-req-btn" id="ai-req-btn" onclick="requestRecommend()">✨ 추천받기</button>
      <div class="ai-result" id="ai-result">
        <div class="ai-result-header">CLAUDE 추천</div>
        <div id="ai-result-body"></div>
      </div>
    </div>
  </div>
</div>

<!-- 바텀 네비 -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('all')" id="nav-all"><div class="nav-icon">📚</div><div class="nav-label">전체</div></div>
  <div class="nav-item" onclick="switchTab('reading')" id="nav-reading"><div class="nav-icon">📖</div><div class="nav-label">읽는 중</div></div>
  <div class="nav-item" onclick="switchTab('want')" id="nav-want"><div class="nav-icon">🔖</div><div class="nav-label">위시리스트</div></div>
  <div class="nav-item" onclick="switchTab('ai')" id="nav-ai"><div class="nav-icon">✨</div><div class="nav-label">AI 추천</div></div>
</div>

<!-- 레벨업 팝업 -->
<div class="levelup-popup" id="levelup-popup">
  <div class="levelup-box">
    <div class="levelup-emoji" id="lu-emoji">🎉</div>
    <div class="levelup-title">LEVEL UP!</div>
    <div class="levelup-level" id="lu-level">LV.2</div>
    <div class="levelup-desc" id="lu-desc">새로운 칭호를 얻었어요!</div>
    <button class="levelup-btn" onclick="closeLevelup()">확인</button>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">책 추가</div>
    <div class="form-group"><label class="form-label">책 제목</label><input class="form-input" id="f-title" type="text" placeholder="책 제목을 입력하세요"></div>
    <div class="form-group"><label class="form-label">저자</label><input class="form-input" id="f-author" type="text" placeholder="저자명"></div>
    <div class="form-group">
      <label class="form-label">상태</label>
      <div class="status-btns">
        <button class="status-btn" id="btn-done"    onclick="selectStatus('done')">✅ 읽었어요</button>
        <button class="status-btn" id="btn-reading" onclick="selectStatus('reading')">📖 읽는 중</button>
        <button class="status-btn" id="btn-want"    onclick="selectStatus('want')">🔖 읽고 싶어</button>
      </div>
    </div>
    <div class="form-group" id="rating-group">
      <label class="form-label">별점</label>
      <div class="star-picker" id="star-picker">
        <span class="star-pick" onclick="selectStar(1)">★</span>
        <span class="star-pick" onclick="selectStar(2)">★</span>
        <span class="star-pick" onclick="selectStar(3)">★</span>
        <span class="star-pick" onclick="selectStar(4)">★</span>
        <span class="star-pick" onclick="selectStar(5)">★</span>
      </div>
    </div>
    <div class="form-group"><label class="form-label">메모 / 감상</label><textarea class="form-input" id="f-memo" placeholder="인상 깊은 구절이나 감상을 적어보세요"></textarea></div>
    <div class="modal-footer">
      <button class="modal-btn btn-cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn btn-save"   onclick="saveBook()">저장</button>
    </div>
  </div>
</div>

<script>
/* ══ 레벨 시스템 정의 ══ */
const LEVELS = [
  { lv:1,  need:0,   name:'새싹 독서가',   title:'첫 책을 기다리는 중...', emoji:'🌱', color:'#7cb87c' },
  { lv:2,  need:3,   name:'호기심 독서가',  title:'책의 재미를 알아가는 중', emoji:'📗', color:'#4a90d9' },
  { lv:3,  need:7,   name:'꾸준한 독서가',  title:'습관이 되기 시작했어요', emoji:'📘', color:'#7c5cbf' },
  { lv:4,  need:15,  name:'열정 독서가',    title:'책이 없으면 허전해요', emoji:'📙', color:'#d4a017' },
  { lv:5,  need:25,  name:'독서 마니아',    title:'장르를 가리지 않아요', emoji:'📕', color:'#c8956c' },
  { lv:6,  need:40,  name:'독서 고수',      title:'책 추천은 나한테 맡겨요', emoji:'🏆', color:'#e8a000' },
  { lv:7,  need:60,  name:'독서 현인',      title:'읽지 않은 책이 없어요', emoji:'🧙', color:'#2d2d2d' },
  { lv:8,  need:100, name:'전설의 독서왕',  title:'독서로 세상을 바꿔요', emoji:'👑', color:'#c8956c' },
];

function getLevelInfo(doneCount) {
  let cur = LEVELS[0];
  for (const lv of LEVELS) { if (doneCount >= lv.need) cur = lv; }
  const idx = LEVELS.indexOf(cur);
  const next = LEVELS[idx + 1] || null;
  const xpCur  = doneCount - cur.need;
  const xpNext = next ? next.need - cur.need : 1;
  const pct    = next ? Math.min(100, Math.round(xpCur / xpNext * 100)) : 100;
  return { cur, next, xpCur, xpNext, pct };
}

/* ══ 캐릭터 그리기 ══ */
function drawCharacter(canvas, doneCount) {
  const ctx = canvas.getContext('2d');
  const W = 72, H = 72;
  ctx.clearRect(0, 0, W, H);
  const { cur } = getLevelInfo(doneCount);

  // 배경
  ctx.fillStyle = cur.color + '22';
  ctx.beginPath(); ctx.roundRect(0, 0, W, H, 12); ctx.fill();

  // 레벨별 캐릭터 이모지
  ctx.font = '38px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(cur.emoji, W/2, H/2 + 2);

  // 레벨 뱃지
  ctx.fillStyle = cur.color;
  ctx.beginPath(); ctx.roundRect(4, 4, 26, 16, 8); ctx.fill();
  ctx.fillStyle = 'white';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LV.' + cur.lv, 17, 12);
}

/* ══ 캐릭터 카드 업데이트 ══ */
const STORAGE_KEY = 'booklog_v2';
let books = [];
let selectedStatus = 'done';
let selectedStar = 0;
let editingId = null;
let prevDone = 0;

function load() { try { books = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { books = []; } }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }

function updateCharacter(animate) {
  const done    = books.filter(b=>b.status==='done').length;
  const reading = books.filter(b=>b.status==='reading').length;
  const { cur, next, xpCur, xpNext, pct } = getLevelInfo(done);

  const canvas = document.getElementById('char-canvas');
  drawCharacter(canvas, done);

  document.getElementById('char-level-label').textContent = `LV.${cur.lv} · ${cur.name}`;
  document.getElementById('char-name').textContent = cur.name;
  document.getElementById('char-title').textContent = cur.title;
  document.getElementById('xp-fill').style.width = pct + '%';
  document.getElementById('xp-label').textContent = next
    ? `${xpCur} / ${xpNext} XP`
    : 'MAX LV';

  document.getElementById('stat-done').textContent    = done;
  document.getElementById('stat-reading').textContent = reading;

  const doneWithRating = books.filter(b=>b.status==='done'&&b.rating);
  const avg = doneWithRating.length
    ? (doneWithRating.reduce((s,b)=>s+b.rating,0)/doneWithRating.length).toFixed(1)
    : '-';
  document.getElementById('stat-avg').textContent = avg;

  const now = new Date();
  const thisMonth = books.filter(b=>{
    if (b.status!=='done'||!b.date) return false;
    const d = new Date(b.dateISO||Date.now());
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).length;
  document.getElementById('stat-streak').textContent = thisMonth;

  document.getElementById('header-sub').textContent = done
    ? `총 ${done}권 완독 · 오늘도 한 페이지` : '오늘도 한 페이지';

  // 레벨업 체크
  if (animate && done > prevDone) {
    const prevLv = getLevelInfo(prevDone).cur.lv;
    const newLv  = cur.lv;
    if (newLv > prevLv) showLevelup(cur);
  }
  prevDone = done;
}

function showLevelup(lvInfo) {
  document.getElementById('lu-emoji').textContent = lvInfo.emoji;
  document.getElementById('lu-level').textContent = `LV.${lvInfo.lv} · ${lvInfo.name}`;
  document.getElementById('lu-desc').textContent  = lvInfo.title;
  document.getElementById('levelup-popup').classList.add('show');
}
function closeLevelup() { document.getElementById('levelup-popup').classList.remove('show'); }
function showCharDetail() {
  const done = books.filter(b=>b.status==='done').length;
  const info = getLevelInfo(done);
  const next = info.next;
  const msg  = next
    ? `현재 LV.${info.cur.lv} ${info.cur.name}\n앞으로 ${next.need - done}권 더 읽으면 "${next.name}"으로 레벨업!`
    : `LV.${info.cur.lv} 최고 레벨 달성! 전설의 독서왕입니다 👑`;
  alert(msg);
}

/* ══ 탭 전환 ══ */
let currentTab = 'all';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['all','done','reading','want','ai'][i]===tab));
  ['all','reading','want','ai'].forEach(n=>{ const el=document.getElementById('nav-'+n); if(el) el.classList.toggle('active',n===tab); });
  document.getElementById('page-books').style.display = tab==='ai'?'none':'block';
  document.getElementById('page-ai').style.display    = tab==='ai'?'block':'none';
  if (tab!=='ai') renderBooks();
}

/* ══ 책 렌더링 ══ */
function renderBooks() {
  const filter   = currentTab==='all'?null:currentTab;
  const filtered = filter ? books.filter(b=>b.status===filter) : [...books];
  filtered.sort((a,b)=>b.id-a.id);
  const el = document.getElementById('book-list');
  if (!filtered.length) {
    const msgs = {all:'아직 기록된 책이 없어요.\n+ 버튼을 눌러 첫 책을 추가해보세요!',done:'아직 완독한 책이 없어요.',reading:'현재 읽고 있는 책을 추가해보세요.',want:'읽고 싶은 책을 추가해보세요.'};
    const icon = {all:'📚',done:'📗',reading:'📖',want:'🔖'}[currentTab]||'📚';
    el.innerHTML=`<div class="empty"><div class="empty-icon">${icon}</div><p>${(msgs[currentTab]||'').replace('\n','<br>')}</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(bookCardHTML).join('');

  // 통계 칩
  const done    = books.filter(b=>b.status==='done').length;
  const reading = books.filter(b=>b.status==='reading').length;
  const want    = books.filter(b=>b.status==='want').length;
  const avgR    = done ? (books.filter(b=>b.status==='done'&&b.rating).reduce((s,b)=>s+b.rating,0)/done).toFixed(1) : '-';
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-chip"><span>${done}</span>권 완독</div>
    <div class="stat-chip"><span>${reading}</span>권 읽는 중</div>
    <div class="stat-chip"><span>${want}</span>권 위시리스트</div>
    <div class="stat-chip">평균 <span>${avgR}</span>점</div>`;
}

function bookCardHTML(b) {
  const coverClass = 'cover-'+b.status;
  const emoji      = b.status==='done'?'📗':b.status==='reading'?'📖':'🔖';
  const badgeClass = 'badge-'+b.status;
  const badgeText  = b.status==='done'?'읽었어요':b.status==='reading'?'읽는 중':'읽고 싶어';
  const stars      = b.status==='done'?`<div class="star-row">${[1,2,3,4,5].map(i=>`<span class="star ${i<=b.rating?'on':''}">★</span>`).join('')}</div>`:'';
  const date       = b.date?`<span class="book-date">${b.date}</span>`:'';
  const memo       = b.memo?`<div class="book-memo">${esc(b.memo)}</div>`:'';
  return `<div class="book-card">
    <div class="book-cover ${coverClass}">${emoji}</div>
    <div class="book-info">
      <div class="book-title">${esc(b.title)}</div>
      <div class="book-author">${esc(b.author||'')}</div>
      <div class="book-meta"><span class="status-badge ${badgeClass}">${badgeText}</span>${stars}${date}</div>
      ${memo}
    </div>
    <div class="card-actions">
      <button class="icon-btn" onclick="openEdit(${b.id})">✏️</button>
      <button class="icon-btn" onclick="deleteBook(${b.id})">🗑</button>
    </div>
  </div>`;
}

/* ══ 모달 ══ */
function openModal(id=null) {
  editingId = id;
  const b = id ? books.find(x=>x.id===id) : null;
  document.getElementById('modal-title').textContent = id?'책 수정':'책 추가';
  document.getElementById('f-title').value  = b?b.title:'';
  document.getElementById('f-author').value = b?b.author:'';
  document.getElementById('f-memo').value   = b?b.memo:'';
  selectStatus(b?b.status:'done');
  selectStar(b?b.rating:0);
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>document.getElementById('f-title').focus(),300);
}
function openEdit(id) { openModal(id); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function closeModalOutside(e) { if(e.target===document.getElementById('modal')) closeModal(); }

function selectStatus(s) {
  selectedStatus = s;
  ['done','reading','want'].forEach(x=>{
    document.getElementById('btn-'+x).className='status-btn'+(x===s?` sel-${x}`:'');
  });
  document.getElementById('rating-group').style.display = s==='done'?'block':'none';
}
function selectStar(n) {
  selectedStar = n;
  document.querySelectorAll('.star-pick').forEach((s,i)=>s.classList.toggle('on',i<n));
}

function saveBook() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { alert('책 제목을 입력해주세요.'); return; }
  const now = new Date();
  const dateStr = (now.getMonth()+1)+'/'+now.getDate();
  prevDone = books.filter(b=>b.status==='done').length;
  if (editingId) {
    const idx = books.findIndex(b=>b.id===editingId);
    if (idx>=0) books[idx]={...books[idx], title, author:document.getElementById('f-author').value.trim(), status:selectedStatus, rating:selectedStar, memo:document.getElementById('f-memo').value.trim()};
  } else {
    books.push({id:Date.now(), title, author:document.getElementById('f-author').value.trim(), status:selectedStatus, rating:selectedStar, memo:document.getElementById('f-memo').value.trim(), date:dateStr, dateISO:now.toISOString()});
  }
  save();
  closeModal();
  renderBooks();
  updateCharacter(true);
}

function deleteBook(id) {
  if (!confirm('이 책을 삭제할까요?')) return;
  books = books.filter(b=>b.id!==id);
  save(); renderBooks(); updateCharacter(false);
}

/* ══ AI 추천 ══ */
async function requestRecommend() {
  const done = books.filter(b=>b.status==='done');
  if (!done.length) { alert('읽은 책이 없으면 취향을 파악하기 어려워요.\n먼저 읽은 책을 한 권 이상 추가해주세요!'); return; }
  const btn    = document.getElementById('ai-req-btn');
  const result = document.getElementById('ai-result');
  const body   = document.getElementById('ai-result-body');
  btn.disabled = true; btn.textContent = '분석 중...';
  result.classList.add('show');
  body.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:13px;"><div class="dots"><span>●</span><span>●</span><span>●</span></div><span>독서 취향을 분석하고 있어요...</span></div>`;

  const bookList = done.map(b=>`- "${b.title}"${b.author?' ('+b.author+')':''}${b.rating?' 별점'+b.rating:''}${b.memo?' — '+b.memo.slice(0,40):''}`).join('\n');
  const prompt = `나는 독서를 좋아하는 사람입니다. 아래 독서 기록을 바탕으로 다음에 읽을 책 3권을 추천해주세요.

완독 목록:
${bookList}

각 책을 아래 형식으로 추천해주세요:
1. 제목 / 저자
추천 이유: (2~3줄)

마크다운 기호는 사용하지 마세요.`;
  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const text = data.content?.[0]?.text||'추천을 가져오지 못했습니다.';
    body.innerHTML = `<div style="white-space:pre-wrap;font-size:13px;line-height:1.85;">${esc(text)}</div>`;
  } catch { body.innerHTML = `<div style="color:#b91c1c;font-size:13px;">⚠️ 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>`; }
  btn.disabled = false; btn.textContent = '✨ 다시 추천받기';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ══ 초기화 ══ */
load();
prevDone = books.filter(b=>b.status==='done').length;
renderBooks();
updateCharacter(false);
</script>
</body>
</html>
